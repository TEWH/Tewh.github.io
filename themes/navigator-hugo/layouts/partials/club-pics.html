{{ $data := index .Site.Data }}
{{ with $data.clubPics }}
<section class="club-pics">
        <div id="myCarousel" class="carousel slide" data-ride="carousel">
            <!-- Club-Pics Slide Indicators -->
            <ol class="carousel-indicators">
                <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
                <li data-target="#myCarousel" data-slide-to="1"></li>
            </ol>
            <!-- Club-Pics Slider -->
            <div class="carousel-inner">
                <!-- First item -->
                <div class="carousel-item active">
                    <!-- Slide Item background image -->
                    <div class="overlay-image" style="background-image:url({{ .image | absURL }});"></div>
                    <div class="container text-center">
                        <h1>TEXT CAN GO HERE</h1>
                        <p>TEXT CAN GO HERE</p>
                    </div>
                </div>
                <!-- Second item -->
                <div class="carousel-item">
                    <div class="container text-center">
                        <h1>TEXT CAN GO HERE TOO</h1>
                        <p>TEXT CAN GO HERE</p>
                    </div>
                </div>
            </div>
            <!-- Club-Pics Slider Previous Button -->
            <a class="carousel-control-prev" href="#myCarousel" role="button" data-slide="prev"> 
                <span class="sr-only">Previous</span>
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </a>
            <!-- Club-Pics Slider Next Button -->
            <a class="carousel-control-next" href="#myCarousel" role="button" data-slide="next"> 
                <span class="sr-only" >Next</span>
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </a>
        </div>
</section>
{{ end }}
